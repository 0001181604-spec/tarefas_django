<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Taskify | Ambient UI{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* === VARIÁVEIS DE DESIGN AMBIENTE (IYO STYLE) === */
        :root {
            --bg-deep: #000000;
            --glass-bg: rgba(20, 20, 20, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --text-inverse: #000000;
            
            --aura-color-1: rgba(58, 123, 255, 0.25); /* Azul etéreo */
            --aura-color-2: rgba(162, 58, 255, 0.2);  /* Roxo IA */
            --accent-solid: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* =========================================
           1. EFEITO DE AURA / ORBE (FUNDO ANIMADO)
           ========================================= */
        .ambient-aura {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80vw;
            height: 80vh;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 30% 50%, var(--aura-color-1), transparent 50%),
                        radial-gradient(circle at 70% 50%, var(--aura-color-2), transparent 50%);
            filter: blur(80px);
            opacity: 0.8;
            z-index: 0;
            pointer-events: none;
            animation: breathe 8s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.9; }
        }

        /* Container principal para manter o grid acima da aura */
        .app-wrapper {
            position: relative;
            z-index: 10;
            height: 100%;
            display: grid;
            grid-template-columns: 280px 1fr;
            padding: 24px;
            gap: 24px;
        }

        /* =========================================
           2. SIDEBAR DE VIDRO (PC)
           ========================================= */
        nav.glass-sidebar {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 48px rgba(0,0,0,0.4);
        }

        .brand-logo {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: -0.03em;
            margin-bottom: 48px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
        }

        .brand-logo i { color: #fff; opacity: 0.8; }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 400;
            padding: 16px 20px;
            border-radius: 100px; /* Pill shape */
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-links a i { font-size: 1.1rem; }

        .nav-links a:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Estilo Iyo: Item ativo vira um botão branco sólido e impactante */
        .nav-links a.active {
            color: var(--text-inverse);
            background: var(--accent-solid);
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        .user-actions { margin-top: auto; }

        .logout-btn {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-radius: 100px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            color: #ff4a4a;
            background: rgba(255, 74, 74, 0.1);
        }

        /* =========================================
           3. CONTEÚDO PRINCIPAL
           ========================================= */
        main.content-area {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px;
            overflow-y: auto;
            position: relative;
        }

        /* Alertas Flutuantes */
        .alert-pill {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            margin-bottom: 24px;
            color: var(--text-main);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        /* =========================================
           4. TELA DE LOGIN 
           ========================================= */
        .auth-wrapper {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 56px 48px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 32px 64px rgba(0,0,0,0.5);
        }

        /* =========================================
           5. FORMULÁRIOS & BOTÕES (ESTILO HARDWARE)
           ========================================= */
        input, select, textarea {
            width: 100%;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px; /* Pill inputs */
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
        }

        .btn-iyo {
            width: 100%;
            padding: 18px;
            background: var(--accent-solid);
            color: var(--text-inverse);
            border: none;
            border-radius: 100px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 10px;
        }

        .btn-iyo:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        }

        /* =========================================
           6. RESPONSIVIDADE (MOBILE DYNAMIC ISLAND)
           ========================================= */
        @media (max-width: 768px) {
            .app-wrapper {
                grid-template-columns: 1fr;
                padding: 16px;
                display: flex;
                flex-direction: column;
            }

            main.content-area {
                border-radius: 24px;
                padding: 24px;
                flex: 1;
                margin-bottom: 80px; /* Espaço para o dock flutuante */
            }

            /* Transformando a Sidebar em um Dock de vidro flutuante (Estilo Dynamic Island) */
            nav.glass-sidebar {
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                width: calc(100% - 48px);
                max-width: 400px;
                flex-direction: row;
                padding: 12px 16px;
                border-radius: 100px;
                justify-content: space-between;
                align-items: center;
                z-index: 100;
                box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            }

            .brand-logo, .logout-btn span { display: none; }
            
            .nav-links {
                flex-direction: row;
                width: 100%;
                justify-content: space-around;
                gap: 0;
            }

            .nav-links a {
                padding: 14px;
                justify-content: center;
            }

            /* No mobile, esconde o texto para o Dock ficar elegante */
            .nav-links a span { display: none; }
            .nav-links a i { font-size: 20px; margin: 0; }
            
            .user-actions { margin-top: 0; }
            .logout-btn { padding: 14px; }
        }
    </style>
</head>
<body>

    <div class="ambient-aura"></div>

    {% if request.resolver_match.url_name == 'login' %}
        <div class="auth-wrapper">
            <div class="glass-card">
                {% block login_content %}{% endblock %}
            </div>
        </div>
    {% else %}
        <div class="app-wrapper">
            
            <nav class="glass-sidebar">
                <div class="brand-logo">
                    <i class="fa-solid fa-circle-notch"></i> Taskify
                </div>

                <div class="nav-links">
                    <a href="{% url 'tarefa-list' %}" class="{% if request.resolver_match.url_name == 'tarefa-list' %}active{% endif %}">
                        <i class="fa-solid fa-layer-group"></i> <span>Tarefas</span>
                    </a>
                    <a href="{% url 'categoria-list' %}" class="{% if request.resolver_match.url_name == 'categoria-list' %}active{% endif %}">
                        <i class="fa-solid fa-shapes"></i> <span>Categorias</span>
                    </a>
                    <a href="{% url 'prioridade-list' %}" class="{% if request.resolver_match.url_name == 'prioridade-list' %}active{% endif %}">
                        <i class="fa-solid fa-bolt"></i> <span>Prioridades</span>
                    </a>
                </div>

                <div class="user-actions">
                    <a href="{% url 'logout' %}" class="logout-btn">
                        <i class="fa-solid fa-power-off"></i> <span>Desconectar</span>
                    </a>
                </div>
            </nav>

            <main class="content-area">
                {% if messages %}
                    {% for msg in messages %}
                        <div class="alert-pill">
                            <i class="fa-solid fa-check-circle" style="color: #4ade80;"></i> {{ msg }}
                        </div>
                    {% endfor %}
                {% endif %}

                {% block content %}{% endblock %}
            </main>

        </div>
    {% endif %}

</body>
</html>
