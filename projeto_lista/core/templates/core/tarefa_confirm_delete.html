{% extends 'base.html' %}

{% block title %}Excluir Tarefa{% endblock %}

{% block content %}
    <h2>Excluir Tarefa</h2>
    <p>Tem certeza que deseja excluir a tarefa <strong>{{ tarefa.titulo }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Sim, excluir</button>
        <a href="{% url 'tarefa-list' %}">Cancelar</a>
    </form>
{% endblock %}
