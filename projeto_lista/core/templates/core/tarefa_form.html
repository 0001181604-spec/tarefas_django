{% extends 'base.html' %}

{% block title %}Tarefa{% endblock %}

{% block content %}
    <h2>Nova Tarefa</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar</button>
        <a href="{% url 'tarefa-list' %}">Cancelar</a>
    </form>
{% endblock %}
