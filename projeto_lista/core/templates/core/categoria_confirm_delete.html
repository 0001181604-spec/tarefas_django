{% extends 'base.html' %}

{% block title %}Excluir Tarefa{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="content-card" style="max-width: 450px; text-align: center; border-top: 4px solid #ff4444;">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 3rem; color: #ff4444; margin-bottom: 20px;"></i>
        <h2>Excluir Tarefa</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">
            Tem certeza que deseja excluir a tarefa <strong>"{{ tarefa.titulo }}"</strong>? Esta ação não pode ser desfeita.
        </p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn-spotify" style="background-color: #ff4444; color: white;">Sim, excluir permanentemente</button>
            <div style="margin-top: 20px;">
                <a href="{% url 'tarefa-list' %}" style="color: var(--text-muted); text-decoration: none;">Mudei de ideia, cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
