{% extends 'base.html' %}

{% block title %}Excluir Categoria{% endblock %}

{% block content %}
    <h2>Excluir Categoria</h2>
    <p>Tem certeza que deseja excluir a categoria <strong>{{ categoria.nome }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Sim, excluir</button>
        <a href="{% url 'categoria-list' %}">Cancelar</a>
    </form>
{% endblock %}
