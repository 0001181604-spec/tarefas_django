{% extends 'base.html' %}

{% block title %}Excluir Prioridade{% endblock %}

{% block content %}
    <div class="card">
        <h2>Excluir Prioridade</h2>
        <p>Tem certeza que deseja excluir a prioridade <strong>{{ prioridade.get_nivel_display }}</strong>?</p>

        <form method="POST">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn btn-danger">Sim, excluir</button>
                <a href="{% url 'prioridade-list' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
{% endblock %}
