{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
    <h2>Entrar no sistema</h2>

    <form method="POST">
        {% csrf_token %}
        <label>Usuário</label>
        <input type="text" name="username">
        <label>Senha</label>
        <input type="password" name="password">
        <button type="submit">Entrar</button>
    </form>
{% endblock %}
