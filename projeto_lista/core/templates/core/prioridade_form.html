{% extends 'base.html' %}

{% block title %}Prioridade{% endblock %}

{% block content %}
    <div class="card">
        <h2>Prioridade</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <a href="{% url 'prioridade-list' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
{% endblock %}
