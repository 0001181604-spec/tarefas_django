<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Spotify Tasks{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
    --bg-black: #000000;
    --bg-sidebar: #000000;
    --bg-main: #121212;
    --bg-card: #181818;
    --bg-hover: #282828;
    --spotify-green: #1DB954;
    --text-main: #ffffff;
    --text-muted: #b3b3b3;
    --border-color: rgba(255,255,255,0.1);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Montserrat', sans-serif;
    background-color: var(--bg-black);
    color: var(--text-main);
    display: grid;
    /* Grid para PC: Sidebar fixa de 260px e o resto é conteúdo */
    grid-template-columns: 260px 1fr;
    height: 100vh;
    overflow: hidden;
}

/* --- SIDEBAR PROFISSIONAL --- */
nav {
    background-color: var(--bg-sidebar);
    padding: 24px 12px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border-color);
}

nav .logo {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--spotify-green);
    margin-bottom: 35px;
    padding-left: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

nav a {
    color: var(--text-muted);
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 5px;
    transition: all 0.2s ease-in-out;
}

nav a:hover {
    color: var(--text-main);
    background-color: var(--bg-hover);
}

nav a i {
    margin-right: 12px;
    font-size: 18px;
}

/* --- CONTAINER PRINCIPAL (SCROLL) --- */
main {
    background: linear-gradient(to bottom, #1e1e1e 0%, var(--bg-main) 100%);
    overflow-y: auto;
    padding: 40px;
}

/* Responsividade para monitores muito grandes: o conteúdo não estica infinitamente */
.content-wrapper {
    max-width: 1200px;
    margin: 0 auto;
}

/* --- CARDS E TABELAS --- */
.content-card {
    background-color: var(--bg-card);
    border-radius: 10px;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* Tabela Responsiva para PC */
.table-responsive {
    width: 100%;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    text-align: left;
    color: var(--text-muted);
    font-size: 13px;
    text-transform: uppercase;
    padding: 12px;
    border-bottom: 1px solid var(--border-color);
}

td {
    padding: 16px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

tr:hover td {
    background-color: rgba(255,255,255,0.05);
}

/* --- BOTÕES --- */
.btn-spotify {
    background-color: var(--spotify-green);
    color: #000;
    padding: 12px 28px;
    border-radius: 500px;
    font-weight: 700;
    text-decoration: none;
    display: inline-block;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, background-color 0.2s;
}

.btn-spotify:hover {
    transform: scale(1.04);
    background-color: #1ed760;
}

/* --- FORMULÁRIOS --- */
input, select, textarea {
    width: 100%;
    background-color: #3e3e3e;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 12px;
    color: white;
    margin-bottom: 20px;
}

input:focus {
    outline: none;
    border-color: #777;
    background-color: #4a4a4a;
}

/* --- LOGIN FULLSCREEN --- */
.login-screen {
    grid-column: 1 / span 2; /* Ocupa a tela toda ignorando a sidebar */
    background: #121212;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
    </style>
</head>
<body>
    {% if request.resolver_match.url_name == 'login' %}
        {% block login_content %}{% endblock %}
    {% else %}
        <nav>
            <div style="padding: 0 15px 20px;">
                <h2 style="color: var(--spotify-green);"><i class="fa-brands fa-spotify"></i> Taskify</h2>
            </div>
            <a href="{% url 'tarefa-list' %}" class="active">
                <i class="fa-solid fa-house"></i> Início
            </a>
            
            <div style="margin-top: auto;">
                <a href="{% url 'logout' %}">
                    <i class="fa-solid fa-right-from-bracket"></i> Sair
                </a>
            </div>
        </nav>

        <main>
            {% if messages %}
            <div class="messages">
                {% for msg in messages %}
                    <div class="msg">{{ msg }}</div>
                {% endfor %}
            </div>
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    {% endif %}
</body>
</html>
