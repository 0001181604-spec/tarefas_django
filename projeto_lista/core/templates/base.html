<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Tarefas{% endblock %}</title>
    <style>     
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        nav a {
            margin-right: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid black;
        }
        th, td {
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        a {
            text-decoration: none;
            color: blue;
        }
        a:hover {
            text-decoration: underline;
        }
        
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'tarefa-list' %}">Tarefas</a>
        <a href="{% url 'logout' %}">Sair</a>
    </nav>

    {% for msg in messages %}
        <p>{{ msg }}</p>
    {% endfor %}

    {% block content %}{% endblock %}
</body>
</html>
